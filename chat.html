<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark CAT - Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body { background-color: #000000; color: #f5f5f5; font-family: 'Poppins', sans-serif; margin: 0; display: flex; overflow: hidden; }
        
        /* สไตล์พื้นฐาน */
        .sidebar { width: 244px; height: 100vh; position: fixed; border-right: 1px solid #262626; padding: 20px 12px; display: flex; flex-direction: column; z-index: 10;}
        .main-content { margin-left: 244px; flex: 1; display: flex; justify-content: center; padding-top: 30px; height: 100vh; }
        .right-panel { width: 319px; padding-top: 20px; border-left: 1px solid #262626; height: 100vh; overflow-y: auto; padding-left: 20px; padding-right: 20px; }

        /* แถบเมนูด้านซ้าย */
        .nav-item { display: flex; align-items: center; padding: 12px 18px; margin-bottom: 12px; background: #0d0d0d; border: 1px solid #ec4899; border-radius: 25px; color: #ec4899; text-decoration: none; font-size: 0.95rem; transition: all 0.3s ease; box-shadow: 0 0 5px rgba(236, 72, 153, 0.05); cursor: pointer; }
        .nav-item:hover { background: rgba(236, 72, 153, 0.1); box-shadow: 0 0 15px rgba(236, 72, 153, 0.3); transform: translateX(5px); }
        .nav-item span:first-child { margin-right: 15px; font-size: 1.1rem; }
        
        /* 🌟 สไตล์พิเศษสำหรับหน้าต่าง Chat 🌟 */
        .chat-container { width: 100%; max-width: 600px; height: calc(100vh - 60px); background: #0d0d0d; border: 1px solid #262626; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; margin-right: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .chat-header { padding: 15px 20px; border-bottom: 1px solid #262626; background: #121212; display: flex; align-items: center; justify-content: space-between; }
        
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #050505; }
        
        /* ดีไซน์ลูกโป่งข้อความ */
        .message { max-width: 75%; padding: 10px 15px; font-size: 0.9rem; line-height: 1.4; word-wrap: break-word; font-family: 'Kanit', sans-serif; display: flex; flex-direction: column; }
        .message.received { background: #1a1a1a; color: white; align-self: flex-start; border-radius: 20px 20px 20px 5px; border: 1px solid #262626; }
        .message.sent { background: #ec4899; color: white; align-self: flex-end; border-radius: 20px 20px 5px 20px; box-shadow: 0 4px 10px rgba(236, 72, 153, 0.2); }
        .msg-time { font-size: 0.7rem; margin-top: 5px; opacity: 0.7; align-self: flex-end; }
        
        /* โซนพิมพ์ข้อความ */
        .chat-input-area { padding: 15px; border-top: 1px solid #262626; background: #121212; display: flex; gap: 10px; align-items: center; }
        .chat-input-area input { flex: 1; background: #000; border: 1px solid #363636; color: white; padding: 12px 20px; border-radius: 25px; outline: none; font-family: 'Kanit', sans-serif; transition: 0.3s; }
        .chat-input-area input:focus { border-color: #ec4899; }
        .chat-input-area button { background: #ec4899; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; font-size: 1.2rem; }
        .chat-input-area button:hover { transform: scale(1.1); }
        
        /* รายชื่อเพื่อนด้านขวา */
        .friend-chat-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .friend-chat-item:hover { background: #1a1a1a; }
        .friend-chat-item.active { background: rgba(236, 72, 153, 0.1); border-left: 3px solid #ec4899; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div style="padding: 10px 12px; margin-bottom: 20px; text-align: center;">
            <img src="logo.png.png" alt="DARK CAT" style="width: 100%; max-width: 160px; filter: drop-shadow(0px 0px 8px rgba(236, 72, 153, 0.4));">
        </div>
        
        <div style="padding-right: 15px; overflow-y: auto; max-height: calc(100vh - 100px);">
            <a href="dashboard.html" class="nav-item"><span>🏠</span> หน้าหลัก</a>
            <a href="chat.html" class="nav-item" style="background: rgba(236, 72, 153, 0.2); box-shadow: 0 0 15px rgba(236, 72, 153, 0.4);"><span>💬</span> ข้อความ</a>
            <a href="notifications.html" class="nav-item"><span>💖</span> การแจ้งเตือน</a>
            <a href="profile.html" class="nav-item"><span>👤</span> โปรไฟล์</a>
            <a href="groups.html" class="nav-item"><span>👥</span> กลุ่ม</a>
            <a href="events.html" class="nav-item"><span>📅</span> กิจกรรม</a>
            <a href="saved.html" class="nav-item"><span>🔖</span> บันทึก</a>
            <a href="settings.html" class="nav-item"><span>⚙️</span> ตั้งค่า</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="chat-container">
            
            <div class="chat-header">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <img id="active-chat-avatar" src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Animals/Black%20Cat.png" style="width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #262626;">
                    <div>
                        <strong id="active-chat-name" style="font-size: 1.1rem; display: block; color: white;">เลือกว่าจะคุยกับใครดี</strong>
                        <span id="active-chat-status" style="font-size: 0.8rem; color: #a8a8a8;">พร้อมแชทเสมอ 🟢</span>
                    </div>
                </div>
                <span style="color: #a8a8a8; cursor: pointer; font-size: 1.2rem;">⋮</span>
            </div>

            <div id="chat-messages-container" class="chat-messages">
                <div style="text-align: center; color: #a8a8a8; margin-top: auto; margin-bottom: auto; font-family: 'Kanit', sans-serif;">
                    <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Smilies/Speech%20Balloon.png" style="width: 60px; opacity: 0.5; margin-bottom: 10px;">
                    <p>เลือกเพื่อนจากแถบด้านขวาเพื่อเริ่มแชทเลย!</p>
                </div>
            </div>

            <div class="chat-input-area">
                <span style="font-size: 1.5rem; cursor: pointer; color: #a8a8a8;">+</span>
                <input type="text" id="message-input" placeholder="พิมพ์ข้อความที่นี่..." disabled>
                <button id="send-msg-btn" disabled>➤</button>
            </div>

        </div>
    </main>

    <aside class="right-panel">
        <h3 style="color: white; font-family: 'Kanit', sans-serif; font-size: 1.2rem; margin-top: 0; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #262626;">รายชื่อเพื่อน 👥</h3>
        
        <div id="chat-friends-list" style="display: flex; flex-direction: column; gap: 5px;">
            <p style="color: #a8a8a8; font-size: 0.85rem; text-align: center;">กำลังโหลดเพื่อน...</p>
        </div>
    </aside>

    <script type="module" src="chat.js"></script>
</body>
</html>
