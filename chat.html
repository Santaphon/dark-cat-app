<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark CAT - Chat Room</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading-screen">
        <h1 class="loading-logo">DARK <span>CAT</span></h1>
        <p style="color: #cbd5e1; margin-top: 10px;">กำลังเข้าสู่ห้องแชท...</p>
    </div>

    <div class="site-logo">DARK <span>CAT</span></div>
    <div class="blob shape1"></div>
    <div class="blob shape2"></div>
    <div class="blob shape3"></div>

    <div class="main-container">
        <div class="form-wrapper" style="width: 500px; max-height: 90vh; display: flex; flex-direction: column;">
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin-bottom: 0;">ห้องแชทส่วนรวม 💬</h2>
                <button id="back-btn" class="login-btn" style="width: auto; padding: 5px 15px; margin-top: 0; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); font-size: 0.8rem;">
                    ⬅️ กลับหน้าโปรไฟล์
                </button>
            </div>
            
            <div id="chat-box" style="flex: 1; min-height: 350px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px;">
                <div style="color: #cbd5e1; text-align: center; font-size: 0.85rem; padding-top: 150px;">กำลังเชื่อมต่อข้อความ...</div>
            </div>

            <div style="display: flex; gap: 10px;">
                <input type="text" id="chat-input" placeholder="พิมพ์ข้อความที่นี่..." style="flex: 1; margin-bottom: 0;">
                <button id="send-chat-btn" class="login-btn" style="width: auto; padding: 0 20px; background: linear-gradient(135deg, #10b981, #059669); margin-top: 0;">ส่ง</button>
            </div>
        </div>
    </div>

    <script type="module" src="chat.js"></script>
</body>
</html>
