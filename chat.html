<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARK CAT - ข้อความ</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; 
            background-color: #000; color: #f5f5f5; font-family: 'Poppins', sans-serif; 
        }
        /* แต่งเมนู Sidebar */
        .sidebar { 
            width: 250px; background: #000; border-right: 1px solid #262626; 
            display: flex; flex-direction: column; padding: 20px; 
        }
        .sidebar .logo { font-size: 1.5rem; font-weight: 800; margin-bottom: 40px; letter-spacing: 1px; }
        .sidebar .logo span { color: #ec4899; }
        .sidebar .nav-item { 
            display: flex; align-items: center; gap: 15px; padding: 12px 15px; 
            color: #f5f5f5; text-decoration: none; font-size: 1.05rem; 
            border-radius: 10px; margin-bottom: 5px; transition: background 0.2s; 
        }
        .sidebar .nav-item:hover { background: #121212; }
        
        /* สกอร์บาร์สวยๆ */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #363636; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">DARK <span>CAT</span></div>
        <a href="dashboard.html" class="nav-item">🏠 หน้าหลัก</a>
        <a href="chat.html" class="nav-item" style="color: #ec4899; font-weight: bold;">💬 ข้อความ</a>
        <a href="profile.html" class="nav-item">👤 โปรไฟล์</a>
        
        <div style="margin-top: auto;">
            <a href="#" class="nav-item" id="logout-btn">🚪 ออกจากระบบ</a>
        </div>
    </nav>

    <main style="flex: 1; display: flex; height: 100vh; background: #0a0a0a;">
        
        <div style="width: 350px; border-right: 1px solid #262626; display: flex; flex-direction: column; background: #000;">
            <div style="padding: 20px; border-bottom: 1px solid #262626; font-weight: bold; font-size: 1.2rem;">ข้อความ</div>
            
            <div id="chat-friends-list" style="flex: 1; overflow-y: auto; padding: 10px;">
                <div style="text-align: center; color: #a8a8a8; margin-top: 20px;">กำลังโหลดรายชื่อเพื่อน...</div>
            </div>
        </div>

        <div style="flex: 1; display: flex; flex-direction: column; background: #0a0a0a; position: relative;">
            
            <div id="chat-header" style="padding: 15px 20px; border-bottom: 1px solid #262626; display: none; align-items: center; gap: 15px; background: #000;">
                <img id="chat-partner-img" src="" style="width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 1px solid #262626;">
                <strong id="chat-partner-name" style="font-size: 1.1rem;">...</strong>
            </div>

            <div id="chat-messages" style="flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px;">
                <div id="chat-placeholder" style="text-align: center; color: #a8a8a8; margin: auto;">
                    <div style="font-size: 3rem; margin-bottom: 10px;">💬</div>
                    เลือกเพื่อนเพื่อเริ่มแชทเลย!
                </div>
            </div>

            <div id="chat-input-area" style="padding: 15px 20px; border-top: 1px solid #262626; background: #000; display: none;">
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="chat-input" placeholder="พิมพ์ข้อความ..." style="flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #363636; background: #121212; color: white; outline: none; font-family: 'Poppins', sans-serif;">
                    <button id="send-msg-btn" style="background: #0095f6; color: white; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: background 0.2s;">ส่ง</button>
                </div>
            </div>
        </div>

    </main>

    <script type="module" src="chat.js"></script>
</body>
</html>
