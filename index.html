<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Cat Login | Glassmorphism</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="site-logo">
        DARK <span>CAT</span>
    </div>
    <div class="blob shape1"></div>
    <div class="blob shape2"></div>
    <div class="blob shape3"></div>

    <div class="main-container">
        
        <div class="character-wrapper">
            <img id="character-pose" src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Animals/Black%20Cat.png" alt="3D Black Cat">
        </div> 

        <div class="form-wrapper">
            <h2 id="form-title">เข้าสู่ระบบ</h2>
            <p class="subtitle" id="form-subtitle">ยินดีต้อนรับกลับมา! คิดถึงจังเลย 🐾</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="login-email">อีเมล</label>
                    <input type="email" id="login-email" placeholder="กรอกอีเมลของคุณ" required>
                </div>
                
                <div class="input-group">
                    <label for="login-password">รหัสผ่าน</label>
                    <input type="password" id="login-password" placeholder="กรอกรหัสผ่านของคุณ" required>
                </div>

                <div class="options-group">
                    <a href="#" class="forgot-pass">ลืมรหัสผ่านใช่หรือไม่?</a>
                </div>
                
                <button type="submit" class="login-btn">เข้าสู่ระบบ</button>

                <div class="divider">
                    <span>หรือเข้าสู่ระบบด้วย</span>
                </div>

                <div class="social-login">
                    <button type="button" class="social-btn" id="google-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        Google
                    </button>
                    <button type="button" class="social-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="color: #1877F2;"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                        Facebook
                    </button>
                </div>

                <div class="register-link">
                    ยังไม่มีบัญชีใช่ไหม? <a href="#" id="show-register">สมัครใช้งานที่นี่</a>
                </div>
            </form>

            <form id="register-form" style="display: none;">
                <div class="input-group">
                    <label for="reg-email">อีเมล</label>
                    <input type="email" id="reg-email" placeholder="ตั้งอีเมลสำหรับสมัคร" required>
                </div>
                
                <div class="input-group">
                    <label for="reg-password">รหัสผ่าน</label>
                    <input type="password" id="reg-password" placeholder="ตั้งรหัสผ่าน (อย่างน้อย 6 ตัวอักษร)" required>
                </div>
                
                <button type="submit" class="login-btn" style="background: linear-gradient(135deg, #ec4899, #8b5cf6);">สร้างบัญชีใหม่</button>

                <div class="register-link" style="margin-top: 25px;">
                    มีบัญชีอยู่แล้ว? <a href="#" id="show-login">กลับไปหน้าเข้าสู่ระบบ</a>
                </div>
            </form>
        </div>
        
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
