<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark CAT - Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { background-color: #000000; color: #f5f5f5; font-family: 'Poppins', sans-serif; margin: 0; display: flex; }
        
        /* 🌟 แถบเมนูด้านซ้าย (เหมือนหน้าอื่นๆ) */
        .sidebar { width: 244px; height: 100vh; position: fixed; border-right: 1px solid #262626; padding: 20px 12px; display: flex; flex-direction: column; z-index: 10; background: #000; }
        .nav-item { display: flex; align-items: center; padding: 12px 18px; margin-bottom: 12px; background: #0d0d0d; border: 1px solid #ec4899; border-radius: 25px; color: #ec4899; text-decoration: none; font-size: 0.95rem; transition: all 0.3s ease; box-shadow: 0 0 5px rgba(236, 72, 153, 0.05); cursor: pointer; }
        .nav-item:hover { background: rgba(236, 72, 153, 0.1); box-shadow: 0 0 15px rgba(236, 72, 153, 0.3); transform: translateX(5px); }
        .nav-item span:first-child { margin-right: 15px; font-size: 1.1rem; }

        /* 🌟 พื้นที่โปรไฟล์หลัก */
        .main-content { margin-left: 244px; flex: 1; display: flex; justify-content: center; padding-top: 0; min-height: 100vh; background: #050505; }
        .profile-container { width: 100%; max-width: 800px; background: #000; border-left: 1px solid #262626; border-right: 1px solid #262626; min-height: 100vh; }
        
        /* ภาพหน้าปก (Cover) และ รูปโปรไฟล์ */
        .cover-photo { width: 100%; height: 200px; background-color: #1a1a1a; background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&w=800&q=80'); background-size: cover; background-position: center; position: relative; }
        .profile-pic-wrapper { position: absolute; bottom: -50px; left: 30px; }
        .profile-pic { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #000; background: #121212; }
        
        /* ข้อมูลโปรไฟล์ */
        .profile-info-section { padding: 60px 30px 20px 30px; border-bottom: 1px solid #262626; }
        .username-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .username-text { font-size: 1.5rem; font-weight: 600; margin: 0; font-family: 'Kanit', sans-serif; color: white; }
        
        .edit-btn { background-color: transparent; color: white; border: 1px solid #363636; padding: 8px 20px; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 0.85rem; transition: 0.2s; font-family: 'Kanit', sans-serif; }
        .edit-btn:hover { background-color: #1a1a1a; border-color: #ec4899; color: #ec4899; }
        
        .bio-row { font-size: 0.9rem; line-height: 1.5; color: #f5f5f5; margin-bottom: 20px; font-family: 'Kanit', sans-serif; }
        .stats-row { display: flex; gap: 30px; font-size: 0.95rem; color: #a8a8a8; }
        .stats-row strong { color: white; }
        
        /* แท็บเมนู */
        .profile-tabs { display: flex; justify-content: center; gap: 50px; border-bottom: 1px solid #262626; }
        .tab-item { padding: 15px 0; font-size: 0.85rem; font-weight: 600; color: #a8a8a8; cursor: pointer; border-bottom: 2px solid transparent; display: flex; align-items: center; gap: 8px; transition: 0.2s; font-family: 'Kanit', sans-serif; }
        .tab-item.active { color: #ec4899; border-bottom: 2px solid #ec4899; }
        
        /* ตารางรูปภาพ (Grid) */
        .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .grid-item { aspect-ratio: 1 / 1; background-color: #121212; position: relative; overflow: hidden; cursor: pointer; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .grid-item:hover img { transform: scale(1.05); filter: brightness(0.8); }

        /* Modal แก้ไขโปรไฟล์ */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal-content { background: #121212; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid #262626; font-family: 'Kanit', sans-serif; }
        .edit-input { width: 100%; padding: 12px; background: #000; border: 1px solid #363636; color: white; border-radius: 8px; outline: none; margin-bottom: 15px; font-family: 'Kanit', sans-serif; }
        .edit-input:focus { border-color: #ec4899; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div style="padding: 10px 12px; margin-bottom: 20px; text-align: center;">
            <img src="logo.png.png" alt="DARK CAT" style="width: 100%; max-width: 160px; filter: drop-shadow(0px 0px 8px rgba(236, 72, 153, 0.4));">
        </div>
        <a href="dashboard.html" class="nav-item"><span>🏠</span> หน้าหลัก</a>
        <a href="chat.html" class="nav-item"><span>💬</span> ข้อความ</a>
        <a href="notifications.html" class="nav-item"><span>💖</span> การแจ้งเตือน</a>
        <a href="profile.html" class="nav-item" style="background: rgba(236, 72, 153, 0.2); box-shadow: 0 0 15px rgba(236, 72, 153, 0.4);"><span>👤</span> โปรไฟล์</a>
        <a href="groups.html" class="nav-item"><span>👥</span> กลุ่ม</a>
        <a href="events.html" class="nav-item"><span>📅</span> กิจกรรม</a>
        <a href="saved.html" class="nav-item"><span>🔖</span> บันทึก</a>
        <a href="settings.html" class="nav-item"><span>⚙️</span> ตั้งค่า</a>
    </nav>

    <main class="main-content">
        <div class="profile-container">
            
            <div class="cover-photo">
                <div class="profile-pic-wrapper">
                    <img id="profile-img" class="profile-pic" src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Animals/Black%20Cat.png" alt="Profile">
                </div>
            </div>
            
            <div class="profile-info-section">
                <div class="username-row">
                    <div>
                        <h2 class="username-text" id="display-name">กำลังโหลด...</h2>
                        <span id="user-email" style="color: #ec4899; font-size: 0.85rem;">@loading</span>
                    </div>
                    <button id="open-edit-modal-btn" class="edit-btn">แก้ไขโปรไฟล์</button>
                </div>
                
                <div class="bio-row" id="display-bio">
                    ยินดีต้อนรับสู่โลกของฉัน! 🐾
                </div>
                
                <div class="stats-row">
                    <span><strong id="post-count">0</strong> โพสต์</span>
                    <span><strong>1.2K</strong> ผู้ติดตาม</span>
                    <span><strong>350</strong> กำลังติดตาม</span>
                </div>
            </div>

            <div class="profile-tabs">
                <div class="tab-item active"><span>▦</span> โพสต์ของฉัน</div>
            </div>

            <div class="post-grid" id="profile-post-grid">
                <div style="grid-column: span 3; text-align: center; color: #a8a8a8; padding: 40px; font-family: 'Kanit', sans-serif;">
                    กำลังค้นหาโพสต์ของคุณ...
                </div>
            </div>

        </div>
    </main>

    <div id="edit-profile-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-top: 0; color: #fff; margin-bottom: 20px;">แก้ไขโปรไฟล์ ✏️</h3>
            
            <div style="display: flex; justify-content: center; gap: 30px; margin-bottom: 25px; align-items: center;">
                <label style="cursor: pointer; text-align: center;">
                    <img id="edit-preview-img" src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Animals/Black%20Cat.png" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #ec4899; display: block; margin: 0 auto 8px;">
                    <span style="color: #ec4899; font-size: 0.8rem; font-weight: 600;">✨ รูปโปรไฟล์</span>
                    <input type="file" id="edit-profile-pic-input" accept="image/*" style="display: none;">
                </label>

                <label style="cursor: pointer; text-align: center;">
                    <div id="edit-preview-cover" style="width: 130px; height: 75px; border-radius: 8px; background: #1a1a1a; border: 2px solid #ec4899; background-size: cover; background-position: center; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; color: #555; font-size: 0.8rem;">
                        ไม่มีภาพ
                    </div>
                    <span style="color: #ec4899; font-size: 0.8rem; font-weight: 600;">🖼️ ภาพหน้าปก</span>
                    <input type="file" id="edit-cover-pic-input" accept="image/*" style="display: none;">
                </label>
            </div>

            <label style="color: #a8a8a8; font-size: 0.85rem; display: block; margin-bottom: 5px;">ชื่อผู้ใช้งาน</label>
            <input type="text" id="edit-name-input" class="edit-input" placeholder="พิมพ์ชื่อใหม่ของคุณ...">

            <label style="color: #a8a8a8; font-size: 0.85rem; display: block; margin-bottom: 5px;">คำอธิบายตัวเอง (Bio)</label>
            <textarea id="edit-bio-input" rows="3" class="edit-input" style="resize: none;" placeholder="เขียนอะไรเท่ๆ หน่อย..."></textarea>

            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px;">
                <button id="close-edit-modal-btn" style="background: #262626; color: #fff; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer;">ยกเลิก</button>
                <button id="save-profile-btn" style="background: #ec4899; color: #fff; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-weight: bold;">บันทึก</button>
            </div>
        </div>
    </div>

    <script type="module" src="profile.js"></script>
</body>
</html>
