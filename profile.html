<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark CAT - Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { background-color: #000000; color: #f5f5f5; font-family: 'Poppins', sans-serif; margin: 0; display: flex; }
        
        /* แถบเมนูด้านซ้าย (เหมือนหน้า Dashboard) */
        .sidebar { width: 244px; height: 100vh; position: fixed; border-right: 1px solid #262626; padding: 20px 12px; display: flex; flex-direction: column; }
        .logo-text { font-size: 1.5rem; font-weight: 600; padding: 10px 12px; margin-bottom: 20px; letter-spacing: 2px; }
        .nav-item { display: flex; align-items: center; padding: 12px; border-radius: 8px; color: white; text-decoration: none; font-size: 1rem; margin-bottom: 5px; transition: background 0.2s; cursor: pointer; }
        .nav-item:hover { background-color: #1a1a1a; }
        .nav-icon { font-size: 1.5rem; margin-right: 15px; width: 24px; text-align: center; }

        /* พื้นที่โปรไฟล์หลัก */
        .main-content { margin-left: 244px; flex: 1; display: flex; justify-content: center; padding-top: 40px; }
        .profile-container { width: 100%; max-width: 935px; padding: 0 20px; }
        
        /* ส่วนหัวโปรไฟล์ (รูป + ข้อมูล) */
        .profile-header { display: flex; margin-bottom: 44px; }
        .profile-pic-section { flex: 1; display: flex; justify-content: center; margin-right: 30px; }
        .profile-pic-wrapper { position: relative; width: 150px; height: 150px; }
        .profile-pic { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 2px solid #262626; padding: 4px; cursor: pointer; }
        
        .profile-info-section { flex: 2; display: flex; flex-direction: column; justify-content: center; }
        .username-row { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .username-text { font-size: 1.25rem; font-weight: 400; margin: 0; }
        .edit-btn { background-color: #363636; color: white; border: none; padding: 7px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.85rem; transition: background 0.2s; }
        .edit-btn:hover { background-color: #262626; }
        
        .stats-row { display: flex; gap: 40px; margin-bottom: 20px; font-size: 1rem; }
        .bio-row { font-size: 0.9rem; line-height: 1.5; }
        
        /* เส้นแบ่งและไอคอนกริด */
        .profile-tabs { border-top: 1px solid #262626; display: flex; justify-content: center; gap: 50px; }
        .tab-item { padding: 15px 0; font-size: 0.75rem; font-weight: 600; letter-spacing: 1px; color: #a8a8a8; cursor: pointer; border-top: 1px solid transparent; display: flex; align-items: center; gap: 5px; }
        .tab-item.active { color: white; border-top: 1px solid white; }
        
        /* ตารางรูปภาพ (Grid) */
        .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-top: 10px; }
        .grid-item { aspect-ratio: 1 / 1; background-color: #121212; position: relative; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .grid-item:hover img { transform: scale(1.05); }

        /* ฟอร์มแก้ไขโปรไฟล์ (ซ่อนไว้ตอนแรก) */
        #edit-form-section { display: none; background: #121212; padding: 20px; border-radius: 8px; border: 1px solid #262626; margin-bottom: 30px; }
        .edit-input { width: 100%; background: #000; border: 1px solid #363636; color: white; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-family: 'Poppins', sans-serif; }
        .save-btn { background: #ec4899; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo-text">DARK CAT</div>
        <a href="dashboard.html" class="nav-item" style="text-decoration: none;">
            <span class="nav-icon">🏠</span> หน้าหลัก
        </a>
        <a href="chat.html" class="nav-item" style="text-decoration: none;">
            <span class="nav-icon">💬</span> ข้อความ
        </a>
        <a href="profile.html" class="nav-item" style="text-decoration: none; font-weight: bold;">
            <span class="nav-icon">👤</span> โปรไฟล์
        </a>
        <div style="flex: 1;"></div>
        <div class="nav-item" id="logout-btn">
            <span class="nav-icon">🚪</span> ออกจากระบบ
        </div>
    </nav>

    <main class="main-content">
        <div class="profile-container">
            
            <header class="profile-header">
                <div class="profile-pic-section">
                    <label for="profile-upload" style="cursor: pointer;">
                        <img id="profile-img" class="profile-pic" src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Animals/Black%20Cat.png" alt="Profile">
                    </label>
                    <input type="file" id="profile-upload" accept="image/*" style="display: none;">
                </div>
                
                <div class="profile-info-section">
                    <div class="username-row">
                        <h2 class="username-text" id="display-name">กำลังโหลด...</h2>
                        <button class="edit-btn" id="toggle-edit-btn">แก้ไขโปรไฟล์</button>
                    </div>
                    <div class="stats-row">
                        <span><strong>2</strong> โพสต์</span>
                        <span>ผู้ติดตาม <strong>287</strong> คน</span>
                        <span>กำลังติดตาม <strong>387</strong> คน</span>
                    </div>
                    <div class="bio-row">
                        <strong id="user-email" style="display: block; margin-bottom: 5px; color: #a8a8a8;">email@example.com</strong>
                        <span id="display-bio">...</span>
                    </div>
                </div>
            </header>

            <div id="edit-form-section">
                <h3 style="margin-top: 0; font-size: 1rem;">แก้ไขข้อมูลส่วนตัว</h3>
                <input type="text" id="profile-name" class="edit-input" placeholder="ชื่อ / นามแฝง">
                <textarea id="profile-bio" class="edit-input" placeholder="สถานะ / คำคม" rows="3"></textarea>
                <button id="save-profile-btn" class="save-btn">บันทึกข้อมูล</button>
                <button id="cancel-edit-btn" style="background: transparent; color: white; border: none; margin-left: 10px; cursor: pointer;">ยกเลิก</button>
            </div>

            <div class="profile-tabs">
                <div class="tab-item active">
                    <span>▦</span> โพสต์
                </div>
                <div class="tab-item">
                    <span>🔖</span> บันทึกไว้
                </div>
            </div>

            <div class="post-grid">
                <div class="grid-item">
                    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=500&auto=format&fit=crop" alt="Post">
                </div>
                <div class="grid-item">
                    <img src="https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?q=80&w=500&auto=format&fit=crop" alt="Post">
                </div>
                </div>

        </div>
    </main>

    <script type="module" src="profile.js"></script>
</body>
</html>
